# Experiment Metadata
experiment:
  case: 'dam_break'
  tag: 'test_mag_residual_model5_Deeper'
  training_mode: 'Stage1' # Options: Stage1, Stage2, Stage3
  enable_ig_loss: False
  save_results: True
  train_size: 100
  eval_size: 150
  seed: 42


# Global Hyperparameters
training:
  batch_size: 2
  epochs: 500
  learning_rate: 0.0001
  scheduler_step: 50
  scheduler_gamma: 0.95

# Model Architecture & Dimensions
model:
  operator_type: 'FNO' # Options: CNO, FNO, WNO, DeepONet
  nx: 328
  ny: 164
  total_steps: 49
  t_in: 1
  magnification_factor: 4

# Architecture-Specific Settings
# fno:
#   mode_x: 8
