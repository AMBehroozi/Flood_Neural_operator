# Environment & IO
paths:
  main_path: '/storage/group/cxs1024/default/mehdi/dam_break/scenario_groups_1'
  topo_file: 'dam_break_processed_data_bed.pt'
  input_file: 'dam_break_matthew_processed_data_input.pt'
  solution_file: 'dam_break_processed_data_solution.pt'

  mag_checkpoint: null
  global_checkpoint: null

  # mag_checkpoint: 'experiments/Hurricane_Matthew/saved_models/saved_model_Hurricane_Matthew_IG_Disable_Nx_328_Ny_164_Tin_1_Tout_88_Samp_test_mag_residual_model5_FNO_DDP_300.pth'
